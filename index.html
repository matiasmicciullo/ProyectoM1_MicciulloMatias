<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
  <title>Paleta de Colores</title>
</head>
<body>
  <header>
    <h1>Paleta de Colores Aleatoria</h1>
  </header>

  <div id="layout">

    <aside id="paletas_guardadas">
      <h2>Paletas Guardadas</h2>
      <div id="contenedor_guardadas"></div>
    </aside>

    <main>
      <div id="cant_colores">
        <h2>Selecciona la cantidad de Colores deseados:</h2>
        <select id="selector_cantidad">
          <option value=""> -- Elegir -- </option>
          <option value="6"> 6 </option>
          <option value="8"> 8 </option>
          <option value="9"> 9 </option>
        </select>
      </div>

      <section>
        <button id="button_generar">Generar Paleta</button>
        <button id="button_guardar">Guardar Paleta</button>
        <div id="contenedor_paleta"></div>
      </section>
    </main>

  </div>

  <script src="script.js"></script>
</body>
